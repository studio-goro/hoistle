<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <title>ナイスを送る</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@100..900&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="../design-system/design-system-example-components-html-main/src/global.css">
  <link rel="stylesheet" href="../design-system/design-system-example-components-html-main/src/components/button/button.css">
  <link rel="stylesheet" href="../design-system/design-system-example-components-html-main/src/components/chip-label/chip-label.css">
  <link rel="stylesheet" href="../design-system/design-system-example-components-html-main/src/components/textarea/textarea.css">
  <link rel="stylesheet" href="./prototype.css">
  <style>
    body {
      --color-primitive-blue-50: var(--color-neutral-solid-gray-50);
      --color-primitive-blue-100: var(--color-neutral-solid-gray-100);
      --color-primitive-blue-200: var(--color-neutral-solid-gray-100);
      --color-primitive-blue-300: var(--color-neutral-solid-gray-200);
      --color-primitive-blue-900: var(--color-neutral-solid-gray-900);
      --color-primitive-blue-1000: var(--color-neutral-solid-gray-800);
      --color-primitive-blue-1200: var(--color-neutral-solid-gray-700);
      background: var(--color-neutral-white);
      color: var(--color-neutral-solid-gray-800);
      padding-bottom: 96px;
    }
    .main {
      padding: 20px 16px 28px;
      gap: 20px;
    }
    .nav-spacer {
      width: 24px;
      flex-shrink: 0;
    }
    .step-panel[hidden] {
      display: none;
    }
    .step-panel {
      display: flex;
      flex-direction: column;
      gap: 16px;
    }
    .intro {
      display: flex;
      flex-direction: column;
      gap: 0;
    }
    .intro__title,
    .completion-title {
      margin: 0;
      font-size: 22px;
      font-weight: 700;
      line-height: 1.4;
      color: var(--color-neutral-solid-gray-900);
    }
    .thanks-card__avatar,
    .completion-avatar {
      width: 44px;
      height: 44px;
      border-radius: 50%;
      overflow: hidden;
      flex-shrink: 0;
      background: var(--color-neutral-solid-gray-100);
      box-shadow: 0 0 0 1px var(--color-neutral-solid-gray-200);
    }
    .thanks-card__avatar {
      border: none;
      padding: 0;
      cursor: pointer;
    }
    .thanks-card__avatar:focus-visible {
      outline: 3px solid var(--color-neutral-solid-gray-200);
      outline-offset: 3px;
    }
    .thanks-card__avatar img,
    .completion-avatar img {
      width: 100%;
      height: 100%;
      object-fit: cover;
      display: block;
      filter: grayscale(100%);
    }
    .thanks-card__body {
      flex: 1;
      min-width: 0;
    }
    .thanks-card__name {
      margin: 0;
      font-size: 16px;
      font-weight: 700;
      line-height: 1.4;
      color: var(--color-neutral-solid-gray-900);
    }
    .thanks-card__meta {
      margin: 3px 0 0;
      font-size: 12px;
      line-height: 1.5;
      color: var(--color-neutral-solid-gray-500);
    }
    .thanks-list {
      display: flex;
      flex-direction: column;
      gap: 12px;
    }
    .thanks-card {
      border: 1px solid var(--color-neutral-solid-gray-200);
      border-radius: 12px;
      padding: 12px;
      display: flex;
      flex-direction: column;
      gap: 10px;
      background: var(--color-neutral-white);
    }
    .thanks-card__profile {
      display: flex;
      align-items: center;
      gap: 10px;
    }
    .reaction-group {
      display: flex;
      flex-direction: column;
      gap: 6px;
    }
    .reaction-group__label,
    .message-label {
      margin: 0;
      font-size: 12px;
      font-weight: 700;
      color: var(--color-neutral-solid-gray-600);
    }
    .reaction-chips {
      display: grid;
      grid-template-columns: repeat(3, minmax(0, 1fr));
      gap: 8px;
    }
    .reaction-chip.dads-chip-label {
      min-height: 62px;
      width: 100%;
      padding: 7px 4px;
      border: 1.5px solid var(--color-neutral-solid-gray-300);
      background: var(--color-neutral-white);
      color: var(--color-neutral-solid-gray-700);
      border-radius: 999px;
      cursor: pointer;
      font-family: inherit;
      font-size: 11px;
      font-weight: 700;
      line-height: 1.25;
      display: inline-flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 3px;
      white-space: normal;
      transition: background 0.18s ease, border-color 0.18s ease, color 0.18s ease, transform 0.18s ease;
    }
    .reaction-chip__icon {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      font-size: 18px;
      line-height: 1;
    }
    .reaction-chip[aria-pressed="true"] {
      background: var(--color-neutral-solid-gray-900);
      border-color: var(--color-neutral-solid-gray-900);
      color: var(--color-neutral-white);
    }
    .reaction-chip:active {
      transform: scale(0.97);
    }
    .message-field {
      display: flex;
      flex-direction: column;
      gap: 6px;
    }
    .message-field[hidden] {
      display: none;
    }
    .message-textarea {
      width: 100%;
      min-height: 72px;
      padding: 10px 12px;
      border: 1.5px solid var(--color-neutral-solid-gray-300);
      border-radius: 8px;
      background: var(--color-neutral-white);
      color: var(--color-neutral-solid-gray-800);
      font: inherit;
      line-height: 1.6;
      resize: vertical;
      box-sizing: border-box;
    }
    .message-textarea:focus {
      outline: 3px solid var(--color-neutral-solid-gray-200);
      border-color: var(--color-neutral-solid-gray-800);
    }
    .error-box {
      display: none;
      padding: 12px;
      border-radius: 10px;
      background: var(--color-neutral-solid-gray-50);
      border: 1px solid var(--color-neutral-solid-gray-300);
      color: var(--color-neutral-solid-gray-800);
      font-size: 13px;
      line-height: 1.6;
    }
    .error-box.is-visible {
      display: block;
    }
    .completion-panel {
      min-height: calc(100vh - 160px);
      justify-content: center;
      text-align: center;
      gap: 20px;
    }
    .completion-visual {
      position: relative;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 12px;
      margin: 0 auto 4px;
    }
    .completion-from {
      width: 56px;
      height: 56px;
      border-radius: 50%;
      background: var(--color-neutral-solid-gray-100);
      display: inline-flex;
      align-items: center;
      justify-content: center;
      flex-shrink: 0;
      overflow: hidden;
      box-shadow: 0 0 0 1px var(--color-neutral-solid-gray-200);
    }
    .completion-from img {
      width: 100%;
      height: 100%;
      object-fit: cover;
      display: block;
      filter: grayscale(100%);
    }
    .completion-arrow {
      color: var(--color-neutral-solid-gray-500);
      display: inline-flex;
      align-items: center;
      justify-content: center;
      flex-shrink: 0;
    }
    .completion-signal {
      position: absolute;
      left: calc(50% - 26px);
      top: 50%;
      width: 20px;
      height: 20px;
      border-radius: 50%;
      background: var(--color-neutral-solid-gray-900);
      color: var(--color-neutral-white);
      display: inline-flex;
      align-items: center;
      justify-content: center;
      font-size: 12px;
      line-height: 1;
      transform: translate(-50%, -50%) scale(0);
      opacity: 0;
      pointer-events: none;
      z-index: 2;
    }
    .completion-receivers {
      position: relative;
      width: 108px;
      height: 56px;
      flex-shrink: 0;
    }
    .completion-receivers .completion-avatar {
      position: absolute;
      top: 0;
      width: 56px;
      height: 56px;
      box-shadow: 0 0 0 3px var(--color-neutral-white), 0 0 0 4px var(--color-neutral-solid-gray-200);
    }
    .completion-receivers .completion-avatar:nth-child(1) { left: 0; }
    .completion-receivers .completion-avatar:nth-child(2) { left: 26px; }
    .completion-receivers .completion-avatar:nth-child(3) { left: 52px; }
    .completion-extra {
      position: absolute;
      right: 0;
      bottom: 0;
      min-width: 24px;
      height: 24px;
      border-radius: 999px;
      background: var(--color-neutral-solid-gray-900);
      color: var(--color-neutral-white);
      display: inline-flex;
      align-items: center;
      justify-content: center;
      font-size: 11px;
      font-weight: 700;
      box-shadow: 0 0 0 3px var(--color-neutral-white);
    }
    .completion-avatar {
      width: 28px;
      height: 28px;
    }
    .fixed-footer {
      padding: 14px 16px max(18px, env(safe-area-inset-bottom));
    }
    .footer-actions {
      display: grid;
      grid-template-columns: minmax(0, 1fr);
      align-items: center;
      gap: 12px;
    }
    .footer-actions .dads-button {
      width: 100%;
      min-width: 0;
      padding-inline: 12px;
      white-space: nowrap;
    }
    .footer-actions .dads-button[hidden],
    .fixed-footer[hidden] {
      display: none;
    }
    .completion-panel .dads-button {
      align-self: center;
      width: auto;
      min-width: 180px;
      border-radius: 999px;
    }
    .profile-sheet-card {
      display: flex;
      flex-direction: column;
      align-items: center;
      text-align: center;
      gap: 12px;
      padding: 8px 0 4px;
    }
    .profile-sheet-avatar {
      width: 72px;
      height: 72px;
      border-radius: 50%;
      overflow: hidden;
      background: var(--color-neutral-solid-gray-100);
      box-shadow: 0 0 0 1px var(--color-neutral-solid-gray-200);
    }
    .profile-sheet-avatar img {
      width: 100%;
      height: 100%;
      object-fit: cover;
      display: block;
      filter: grayscale(100%);
    }
    .profile-sheet-name {
      margin: 0;
      color: var(--color-neutral-solid-gray-900);
      font-size: 18px;
      font-weight: 700;
      line-height: 1.45;
    }
    .profile-sheet-text {
      margin: 0;
      color: var(--color-neutral-solid-gray-700);
      font-size: 14px;
      line-height: 1.75;
      text-align: left;
    }
    .profile-sheet-follow.dads-button {
      width: 100%;
      margin-top: 4px;
      justify-content: center;
      border-radius: 999px;
    }
    .completion-panel:not([hidden]) .completion-from {
      animation: completion-pop 0.42s cubic-bezier(.2, .8, .2, 1) both;
    }
    .completion-panel:not([hidden]) .completion-arrow {
      animation: completion-fade-slide 0.36s ease-out 0.16s both;
    }
    .completion-panel:not([hidden]) .completion-signal {
      animation: completion-send 0.82s cubic-bezier(.25, .8, .25, 1) 0.22s both;
    }
    .completion-panel:not([hidden]) .completion-receivers {
      animation: completion-pop 0.44s cubic-bezier(.2, .8, .2, 1) 0.72s both;
    }
    .completion-panel:not([hidden]) .completion-receivers .completion-avatar {
      animation: completion-receive 0.42s cubic-bezier(.2, .8, .2, 1) 0.82s both;
    }
    .completion-panel:not([hidden]) .completion-receivers .completion-avatar:nth-child(2) {
      animation-delay: 0.88s;
    }
    .completion-panel:not([hidden]) .completion-receivers .completion-avatar:nth-child(3) {
      animation-delay: 0.94s;
    }
    .completion-panel:not([hidden]) .completion-title {
      animation: completion-fade-up 0.4s ease-out 0.9s both;
    }
    .completion-panel:not([hidden]) .dads-button {
      animation: completion-fade-up 0.4s ease-out 1.02s both;
    }
    @keyframes completion-pop {
      0% {
        opacity: 0;
        transform: scale(0.82);
      }
      70% {
        opacity: 1;
        transform: scale(1.04);
      }
      100% {
        opacity: 1;
        transform: scale(1);
      }
    }
    @keyframes completion-fade-slide {
      0% {
        opacity: 0;
        transform: translateX(-8px);
      }
      100% {
        opacity: 1;
        transform: translateX(0);
      }
    }
    @keyframes completion-send {
      0% {
        opacity: 0;
        transform: translate(-50%, -50%) scale(0.4);
      }
      18% {
        opacity: 1;
        transform: translate(-50%, -50%) scale(1);
      }
      78% {
        opacity: 1;
        transform: translate(54px, -50%) scale(1);
      }
      100% {
        opacity: 0;
        transform: translate(66px, -50%) scale(0.7);
      }
    }
    @keyframes completion-receive {
      0% {
        transform: scale(1);
      }
      42% {
        transform: scale(1.12) translateY(-2px);
      }
      100% {
        transform: scale(1) translateY(0);
      }
    }
    @keyframes completion-fade-up {
      0% {
        opacity: 0;
        transform: translateY(10px);
      }
      100% {
        opacity: 1;
        transform: translateY(0);
      }
    }
    @media (prefers-reduced-motion: reduce) {
      .completion-panel:not([hidden]) .completion-from,
      .completion-panel:not([hidden]) .completion-arrow,
      .completion-panel:not([hidden]) .completion-signal,
      .completion-panel:not([hidden]) .completion-receivers,
      .completion-panel:not([hidden]) .completion-receivers .completion-avatar,
      .completion-panel:not([hidden]) .completion-title,
      .completion-panel:not([hidden]) .dads-button {
        animation: none;
      }
      .completion-signal {
        display: none;
      }
    }
  </style>
</head>
<body>
  <script src="./auth.js"></script>

  <div class="nav-bar">
    <a class="nav-back" id="close-link" href="./参加者専用_エンジョイ-開催後.html" aria-label="閉じる">
      <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" aria-hidden="true">
        <path d="M6 6l12 12M18 6 6 18" stroke-linecap="round"/>
      </svg>
    </a>
    <p class="nav-title" id="screen-title">ナイスを送る</p>
    <span class="nav-spacer" aria-hidden="true"></span>
  </div>

  <main class="main">
    <div class="step-panel" id="thanks-step">
      <section class="intro" aria-labelledby="thanks-title">
        <h1 class="intro__title" id="thanks-title">送信対象ユーザー</h1>
      </section>
      <div class="error-box" id="send-error" role="alert">送信できませんでした。通信状況を確認して、もう一度お試しください。</div>
      <section class="thanks-list" id="thanks-list" aria-label="送信対象ユーザー一覧"></section>
    </div>

    <div class="step-panel completion-panel" id="complete-step" hidden>
      <div class="completion-visual" aria-hidden="true">
        <div class="completion-from">
          <img src="../material/user-icon/Toshinari.Asahi_旭俊成.png" alt="">
        </div>
        <svg class="completion-arrow" width="28" height="18" viewBox="0 0 28 18" fill="none">
          <path d="M1 9h24m-7-7 7 7-7 7" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
        </svg>
        <span class="completion-signal">👍</span>
        <div class="completion-receivers" id="complete-visual-receivers"></div>
      </div>
      <section class="intro" aria-labelledby="complete-title">
        <h1 class="completion-title" id="complete-title">ナイスを送りました</h1>
      </section>
      <a class="dads-button" data-size="lg" data-type="outline" id="return-link" href="./参加者専用_エンジョイ-開催後.html">戻る</a>
    </div>
  </main>

  <footer class="fixed-footer" id="fixed-footer">
    <div class="footer-actions" id="footer-actions">
      <button class="dads-button" data-size="lg" data-type="solid-fill" type="button" id="primary-action" disabled>送信する</button>
    </div>
  </footer>

  <dialog class="bottom-sheet" id="profile-sheet" aria-labelledby="profile-sheet-title">
    <div class="sheet-handle" aria-hidden="true"></div>
    <div class="sheet-header">
      <h2 class="sheet-title" id="profile-sheet-title">プロフィール</h2>
      <button class="sheet-close" type="button" id="profile-sheet-close" aria-label="閉じる">
        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" aria-hidden="true">
          <path d="M6 6l12 12M18 6 6 18" stroke-linecap="round"/>
        </svg>
      </button>
    </div>
    <div class="sheet-body">
      <div class="profile-sheet-card">
        <div class="profile-sheet-avatar">
          <img id="profile-sheet-avatar" src="" alt="">
        </div>
        <p class="profile-sheet-name" id="profile-sheet-name"></p>
        <p class="profile-sheet-text" id="profile-sheet-text"></p>
        <button class="dads-button profile-sheet-follow" data-type="solid-fill" data-size="md" type="button">フォローする</button>
      </div>
    </div>
  </dialog>

  <script>
    var params = new URLSearchParams(window.location.search);
    var returnUrl = params.get('return') || './参加者専用_エンジョイ-開催後.html';
    var eventId = params.get('eventId') || 'enjoy-after-001';
    var senderUserId = 'current-user-001';
    var currentStep = 'thanks';
    var selectedReceiverIds = [];
    var isSubmitting = false;

    var reactions = [
      { label: 'ナイスプレー', icon: '👍' },
      { label: 'チームプレー最高', icon: '🤝' },
      { label: '声かけ助かった', icon: '📣' },
      { label: 'ありがとう', icon: '🙏' },
      { label: '楽しかった', icon: '😊' },
      { label: 'また一緒に', icon: '🏀' }
    ];
    var members = [
      { id: 'nanami-tanahashi', avatar: '../material/user-icon/Nanami.Tanahashi_棚橋七海.png', name: '棚橋 七海', meta: 'チームB · 背番号12', profileText: 'バレーとバスケが好きです。初心者の方も大歓迎！みんなで楽しく体を動かしましょう。' },
      { id: 'yusaku-takasugi', avatar: '../material/user-icon/Yusaku.Takasugi_高杉優作.png', name: '高杉 優作', meta: 'チームC · 背番号23', profileText: 'バスケとランニングが好きです。週2〜3回活動しています。試合になると本気出します。初めての方も気軽に声かけてください！' },
      { id: 'hayato-akaiwa', avatar: '../material/user-icon/Hayato.Akaiwa_赤岩駿斗.png', name: '赤岩 駿斗', meta: 'チームA · 背番号4', profileText: 'スポーツ全般好きです。仕事終わりに軽く動けるイベントをよく探しています！よろしく！' },
      { id: 'mana-kurita', avatar: '../material/user-icon/Mana.Kurita_栗田茉奈.png', name: '栗田 茉奈', meta: 'チームB · 背番号9', profileText: 'テニスとランニングが好きです。健康のために体を動かせる仲間を探しています！' },
      { id: 'hikaru-tezuka', avatar: '../material/user-icon/Hikaru.Tezuka_手塚光.png', name: '手塚 光', meta: 'チームC · 背番号15', profileText: '週末は必ずスポーツしています。バスケのスリーポイントが得意です！' },
      { id: 'takeru-mukai', avatar: '../material/user-icon/Takeru .Mukai_向井猛.png', name: '向井 猛', meta: 'チームA · 背番号18', profileText: 'サッカーメインですが、最近バスケにもハマってます。フットワーク得意です。' },
      { id: 'yuichi-yoshimura', avatar: '../material/user-icon/Yuichi.Yoshimura_吉村優一.png', name: '吉村 優一', meta: 'チームB · 背番号21', profileText: '週1〜2回活動しています。仕事帰りに気軽に参加できるイベントが好きです。' }
    ];
    var thanksDrafts = {};

    var closeLink = document.getElementById('close-link');
    var screenTitle = document.getElementById('screen-title');
    var thanksStep = document.getElementById('thanks-step');
    var completeStep = document.getElementById('complete-step');
    var thanksList = document.getElementById('thanks-list');
    var sendError = document.getElementById('send-error');
    var primaryAction = document.getElementById('primary-action');
    var fixedFooter = document.getElementById('fixed-footer');
    var returnLink = document.getElementById('return-link');
    var completeVisualReceivers = document.getElementById('complete-visual-receivers');
    var profileSheet = document.getElementById('profile-sheet');
    var profileSheetClose = document.getElementById('profile-sheet-close');
    var profileSheetAvatar = document.getElementById('profile-sheet-avatar');
    var profileSheetName = document.getElementById('profile-sheet-name');
    var profileSheetText = document.getElementById('profile-sheet-text');

    closeLink.href = returnUrl;
    returnLink.href = withThanksCompleted(returnUrl);

    function getMember(id) {
      return members.find(function (member) { return member.id === id; });
    }

    function ensureDraft(receiverUserId) {
      if (!thanksDrafts[receiverUserId]) {
        thanksDrafts[receiverUserId] = {
          eventId: eventId,
          senderUserId: senderUserId,
          receiverUserId: receiverUserId,
          selectedReactions: [],
          optionalMessage: '',
          sentAt: null
        };
      }
      return thanksDrafts[receiverUserId];
    }

    function withThanksCompleted(urlValue) {
      var url = new URL(urlValue, window.location.href);
      url.searchParams.set('thanks', 'completed');
      return url.href;
    }

    function openProfileSheet(receiverUserId) {
      var member = getMember(receiverUserId);
      if (!member) return;
      profileSheetAvatar.src = member.avatar;
      profileSheetAvatar.alt = member.name;
      profileSheetName.textContent = member.name;
      profileSheetText.textContent = member.profileText;
      if (typeof profileSheet.showModal === 'function') {
        profileSheet.showModal();
      } else {
        profileSheet.setAttribute('open', '');
      }
    }

    function renderThanksList() {
      thanksList.innerHTML = selectedReceiverIds.map(function (receiverUserId) {
        var member = getMember(receiverUserId);
        var draft = ensureDraft(receiverUserId);
        var hasReaction = draft.selectedReactions.length > 0;
        var chips = reactions.map(function (reaction) {
          var pressed = draft.selectedReactions.includes(reaction.label);
          return [
            '<button class="dads-chip-label reaction-chip" data-style="outline" data-color="gray" type="button" data-receiver-id="' + receiverUserId + '" data-reaction="' + reaction.label + '" aria-pressed="' + pressed + '">',
            '  <span class="reaction-chip__icon" aria-hidden="true">' + reaction.icon + '</span>',
            '  <span>' + reaction.label + '</span>',
            '</button>'
          ].join('');
        }).join('');
        return [
          '<article class="thanks-card" data-thanks-card="' + receiverUserId + '">',
          '  <div class="thanks-card__profile">',
          '    <button class="thanks-card__avatar" type="button" data-profile-id="' + receiverUserId + '" aria-label="' + member.name + 'のプロフィールを表示"><img src="' + member.avatar + '" alt="' + member.name + '"></button>',
          '    <div class="thanks-card__body">',
          '      <h2 class="thanks-card__name">' + member.name + '</h2>',
          '      <p class="thanks-card__meta">' + member.meta + '</p>',
          '    </div>',
          '  </div>',
          '  <div class="reaction-group">',
          '    <div class="reaction-chips" role="group" aria-label="' + member.name + 'へ送る一言">' + chips + '</div>',
          '  </div>',
          '  <div class="message-field"' + (hasReaction ? '' : ' hidden') + '>',
          '    <label class="message-label" for="message-' + receiverUserId + '">ひとこと添える（任意）</label>',
          '    <textarea class="message-textarea" id="message-' + receiverUserId + '" data-message-for="' + receiverUserId + '" placeholder="例：声をかけてくれて嬉しかったです">' + draft.optionalMessage + '</textarea>',
          '  </div>',
          '</article>'
        ].join('');
      }).join('');

      thanksList.querySelectorAll('[data-profile-id]').forEach(function (button) {
        button.addEventListener('click', function () {
          openProfileSheet(button.dataset.profileId);
        });
      });
      thanksList.querySelectorAll('.reaction-chip').forEach(function (chip) {
        chip.addEventListener('click', function () {
          var receiverUserId = chip.dataset.receiverId;
          var draft = ensureDraft(receiverUserId);
          if (draft.selectedReactions.includes(chip.dataset.reaction)) {
            draft.selectedReactions = draft.selectedReactions.filter(function (reaction) {
              return reaction !== chip.dataset.reaction;
            });
          } else {
            draft.selectedReactions.push(chip.dataset.reaction);
          }
          renderThanksList();
        });
      });
      thanksList.querySelectorAll('.message-textarea').forEach(function (textarea) {
        textarea.addEventListener('input', function () {
          ensureDraft(textarea.dataset.messageFor).optionalMessage = textarea.value;
        });
      });
    }

    function showThanksStep() {
      currentStep = 'thanks';
      thanksStep.hidden = false;
      completeStep.hidden = true;
      fixedFooter.hidden = false;
      primaryAction.textContent = '送信する';
      primaryAction.disabled = false;
      screenTitle.textContent = 'ナイスを送る';
      sendError.classList.remove('is-visible');
      renderThanksList();
      window.scrollTo({ top: 0, behavior: 'smooth' });
    }

    function showCompleteStep(payload) {
      currentStep = 'complete';
      thanksStep.hidden = true;
      completeStep.hidden = false;
      fixedFooter.hidden = true;
      screenTitle.textContent = '送信完了';
      closeLink.href = withThanksCompleted(returnUrl);
      document.getElementById('complete-title').textContent = payload.thanks.length + '人にナイスを送りました';
      completeVisualReceivers.innerHTML = payload.thanks.slice(0, 3).map(function (item) {
        var member = getMember(item.receiverUserId);
        return '<span class="completion-avatar"><img src="' + member.avatar + '" alt=""></span>';
      }).join('') + (payload.thanks.length > 3 ? '<span class="completion-extra">+' + (payload.thanks.length - 3) + '</span>' : '');
      window.scrollTo({ top: 0, behavior: 'smooth' });
    }

    function buildPayload() {
      var sentAt = new Date().toISOString();
      return {
        eventId: eventId,
        senderUserId: senderUserId,
        sentAt: sentAt,
        thanks: selectedReceiverIds.map(function (receiverUserId) {
          var draft = ensureDraft(receiverUserId);
          return {
            eventId: eventId,
            senderUserId: senderUserId,
            receiverUserId: receiverUserId,
            selectedReaction: draft.selectedReactions.slice(),
            optionalMessage: draft.optionalMessage.trim(),
            sentAt: sentAt
          };
        })
      };
    }

    function saveThanks(payload) {
      return new Promise(function (resolve, reject) {
        window.setTimeout(function () {
          try {
            var key = 'whistle:thanks:' + eventId + ':' + senderUserId;
            window.localStorage.setItem(key, JSON.stringify(payload));
            resolve(payload);
          } catch (error) {
            reject(error);
          }
        }, 520);
      });
    }

    function submitThanks() {
      if (isSubmitting) return;
      isSubmitting = true;
      sendError.classList.remove('is-visible');
      primaryAction.disabled = true;
      primaryAction.textContent = '送信中...';
      saveThanks(buildPayload())
        .then(function (payload) {
          isSubmitting = false;
          showCompleteStep(payload);
        })
        .catch(function () {
          isSubmitting = false;
          primaryAction.disabled = false;
          primaryAction.textContent = 'もう一度送信する';
          sendError.classList.add('is-visible');
        });
    }

    primaryAction.addEventListener('click', function () {
      if (currentStep === 'thanks') submitThanks();
    });

    profileSheetClose.addEventListener('click', function () {
      profileSheet.close();
    });
    profileSheet.addEventListener('click', function (event) {
      if (event.target === profileSheet) profileSheet.close();
    });

    selectedReceiverIds = members.map(function (member) { return member.id; });
    selectedReceiverIds.forEach(ensureDraft);
    showThanksStep();
  </script>
  <script src="./prototype-map.js"></script>
</body>
</html>
