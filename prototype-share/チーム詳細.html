<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <title>チーム詳細</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@100..900&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="../design-system/design-system-example-components-html-main/src/global.css">
  <link rel="stylesheet" href="../design-system/design-system-example-components-html-main/src/components/button/button.css">
  <link rel="stylesheet" href="./prototype.css">
  <style>
    body {
      background: var(--color-neutral-solid-gray-50);
      padding-bottom: 88px;
    }

    .nav-bar {
      min-height: 56px;
      padding: 8px 12px;
    }

    .nav-action {
      width: 40px;
      height: 40px;
      padding: 0;
      border: 0;
      border-radius: 999px;
      background: transparent;
      color: var(--color-neutral-solid-gray-800);
      display: inline-flex;
      align-items: center;
      justify-content: center;
      cursor: pointer;
    }
    .nav-action:hover {
      background: var(--color-neutral-solid-gray-50);
    }
    .nav-action svg {
      width: 24px;
      height: 24px;
    }

    .team-main {
      display: flex;
      flex-direction: column;
      gap: 8px;
      padding: 0 0 48px;
    }

    .panel {
      background: var(--color-neutral-white);
      border-top: 1px solid var(--color-neutral-solid-gray-100);
      border-bottom: 1px solid var(--color-neutral-solid-gray-100);
      padding: 20px 16px;
    }

    .team-overview {
      display: flex;
      flex-direction: column;
      gap: 16px;
      border-top: 0;
    }

    .team-profile {
      display: grid;
      grid-template-columns: 72px minmax(0, 1fr);
      gap: 14px;
      align-items: center;
    }

    .team-logo {
      width: 72px;
      height: 72px;
      border-radius: 14px;
      background: var(--color-neutral-solid-gray-100);
      border: 1px solid var(--color-neutral-solid-gray-200);
      color: var(--color-neutral-solid-gray-500);
      display: flex;
      align-items: center;
      justify-content: center;
      overflow: hidden;
      position: relative;
    }
    .team-logo::before,
    .team-logo::after {
      content: "";
      position: absolute;
      inset: 0;
      pointer-events: none;
    }
    .team-logo::before {
      background: linear-gradient(to top right, transparent calc(50% - 0.5px), var(--color-neutral-solid-gray-300), transparent calc(50% + 0.5px));
    }
    .team-logo::after {
      background: linear-gradient(to bottom right, transparent calc(50% - 0.5px), var(--color-neutral-solid-gray-300), transparent calc(50% + 0.5px));
    }
    .team-logo img {
      width: 28px;
      height: 28px;
      opacity: 0.45;
      position: relative;
      z-index: 1;
    }

    .team-name {
      font-size: 24px;
      font-weight: 800;
      line-height: 1.35;
      color: var(--color-neutral-solid-gray-900);
      margin: 0 0 10px;
    }

    .team-level-text {
      color: var(--color-neutral-solid-gray-700);
      font-size: 13px;
      font-weight: 700;
      line-height: 1.5;
      margin: 0;
    }
    .team-level-text strong {
      color: var(--color-neutral-solid-gray-900);
      font-weight: 800;
    }

    .stats-grid {
      display: grid;
      grid-template-columns: repeat(3, minmax(0, 1fr));
      gap: 8px;
    }

    .stat-item {
      background: var(--color-neutral-solid-gray-50);
      border: 1px solid var(--color-neutral-solid-gray-100);
      border-radius: 8px;
      padding: 12px 10px;
      min-width: 0;
    }
    .stat-label {
      display: block;
      color: var(--color-neutral-solid-gray-600);
      font-size: 11px;
      font-weight: 700;
      line-height: 1.45;
      margin-bottom: 4px;
    }
    .stat-value {
      display: block;
      color: var(--color-neutral-solid-gray-900);
      font-size: 17px;
      font-weight: 800;
      line-height: 1.35;
      white-space: nowrap;
    }

    .section-head {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
      margin-bottom: 12px;
    }
    .section-title {
      font-size: 16px;
      font-weight: 800;
      line-height: 1.5;
      color: var(--color-neutral-solid-gray-900);
      margin: 0;
      padding-left: 10px;
      border-left: 4px solid var(--color-neutral-solid-gray-900);
    }

    .planned-member-list {
      display: flex;
      flex-direction: column;
      gap: 0;
    }
    .planned-member {
      display: flex;
      align-items: center;
      gap: 12px;
      min-height: 76px;
      padding: 12px 0;
      border-bottom: 1px solid var(--color-neutral-solid-gray-100);
    }
    .planned-member:last-child {
      border-bottom: none;
    }
    .planned-member__avatar {
      width: 52px;
      height: 52px;
      flex: 0 0 52px;
      border-radius: 50%;
      background: var(--color-neutral-solid-gray-100);
      object-fit: cover;
      display: block;
      filter: grayscale(100%);
    }
    .planned-member__body {
      flex: 1;
      min-width: 0;
    }
    .planned-member__name {
      color: var(--color-neutral-solid-gray-900);
      font-size: 15px;
      font-weight: 800;
      line-height: 1.5;
      margin: 0;
    }
    .planned-member__team {
      color: var(--color-neutral-solid-gray-600);
      font-size: 13px;
      line-height: 1.5;
      margin: 2px 0 0;
    }
    .planned-member__count {
      color: var(--color-neutral-solid-gray-700);
      font-size: 12px;
      font-weight: 700;
      line-height: 1.5;
      margin: 4px 0 0;
    }
    .planned-member__meta {
      display: flex;
      justify-content: flex-end;
      min-width: 1px;
      flex: 0 0 auto;
    }
    .planned-member__badge {
      flex: 0 0 auto;
      padding: 4px 8px;
      border-radius: 999px;
      background: var(--color-neutral-solid-gray-800);
      color: var(--color-neutral-white);
      font-size: 11px;
      font-weight: 700;
      line-height: 1.4;
      white-space: nowrap;
    }

    .challenge-footer {
      position: fixed;
      left: 50%;
      bottom: 0;
      z-index: 120;
      width: 100%;
      max-width: 390px;
      transform: translateX(-50%);
      padding: 14px 16px 18px;
      border-top: 1px solid var(--color-neutral-solid-gray-200);
      background: linear-gradient(180deg, var(--color-neutral-white) 0%, var(--color-neutral-solid-gray-100) 100%);
      box-shadow: 0 -12px 28px rgba(0, 0, 0, 0.16);
      box-sizing: border-box;
    }
    .challenge-footer__copy {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 6px;
      margin: 0;
      color: var(--color-neutral-solid-gray-900);
      font-size: 13px;
      font-weight: 800;
      line-height: 1.45;
      text-align: center;
    }
    @media (max-width: 360px) {
      .team-profile {
        grid-template-columns: 64px minmax(0, 1fr);
      }
      .team-logo {
        width: 64px;
        height: 64px;
      }
      .team-name {
        font-size: 21px;
      }
      .stat-value {
        font-size: 15px;
      }
      .planned-member {
        align-items: flex-start;
      }
      .planned-member__meta {
        margin-top: 4px;
      }
      .challenge-footer__copy {
        font-size: 12px;
      }
    }
  </style>
</head>
<body>
  <header class="nav-bar">
    <button class="nav-action" type="button" aria-label="閉じる" onclick="history.back()">
      <img src="../material/icon/close.svg" width="24" height="24" alt="" aria-hidden="true">
    </button>
    <p class="nav-title">チーム詳細</p>
    <span class="nav-action" aria-hidden="true" style="visibility:hidden;pointer-events:none;"></span>
  </header>

  <main class="team-main">
    <section class="panel team-overview" aria-label="チーム概要">
      <div class="team-profile">
        <div class="team-logo" aria-label="チームアイコン画像">
          <img src="../material/icon/image.svg" alt="">
        </div>
        <div>
          <h1 class="team-name">Aチーム</h1>
          <p class="team-level-text">チームレベル <strong>50</strong></p>
        </div>
      </div>

      <div class="stats-grid" aria-label="チームスタッツ">
        <div class="stat-item">
          <span class="stat-label">年齢層</span>
          <span class="stat-value">20代後半</span>
        </div>
        <div class="stat-item">
          <span class="stat-label">参加回数</span>
          <span class="stat-value">15回</span>
        </div>
        <div class="stat-item">
          <span class="stat-label">優勝回数</span>
          <span class="stat-value">3回</span>
        </div>
      </div>
    </section>

    <section class="panel" aria-labelledby="planned-members-title">
      <div class="section-head">
        <h2 id="planned-members-title" class="section-title">参加予定のメンバー</h2>
      </div>
      <div class="planned-member-list">
        <div class="planned-member" data-prev-same="true" data-prev-label="前回も一緒！">
          <img class="planned-member__avatar" src="../material/user-icon/Toshinari.Asahi_旭俊成.png" alt="旭俊成">
          <div class="planned-member__body">
            <p class="planned-member__name">旭 俊成</p>
            <p class="planned-member__team">Aチーム</p>
            <p class="planned-member__count">一緒になった回数：3回</p>
          </div>
          <span class="planned-member__meta"></span>
        </div>
        <div class="planned-member" data-prev-same="true" data-prev-label="前回も一緒！">
          <img class="planned-member__avatar" src="../material/user-icon/Yusaku.Takasugi_高杉優作.png" alt="高杉優作">
          <div class="planned-member__body">
            <p class="planned-member__name">高杉 優作</p>
            <p class="planned-member__team">Aチーム</p>
            <p class="planned-member__count">一緒になった回数：2回</p>
          </div>
          <span class="planned-member__meta"></span>
        </div>
        <div class="planned-member" data-prev-same="false">
          <img class="planned-member__avatar" src="../material/user-icon/Nanami.Tanahashi_棚橋七海.png" alt="棚橋七海">
          <div class="planned-member__body">
            <p class="planned-member__name">棚橋 七海</p>
            <p class="planned-member__team">Aチーム</p>
          </div>
          <span class="planned-member__meta"></span>
        </div>
        <div class="planned-member" data-prev-same="false">
          <img class="planned-member__avatar" src="../material/user-icon/Mana.Kurita_栗田茉奈.png" alt="栗田茉奈">
          <div class="planned-member__body">
            <p class="planned-member__name">栗田 茉奈</p>
            <p class="planned-member__team">Aチーム</p>
            <p class="planned-member__count">一緒になった回数：1回</p>
          </div>
          <span class="planned-member__meta"></span>
        </div>
      </div>
    </section>
  </main>

  <footer class="challenge-footer" aria-label="格上挑戦ボーナス">
    <p class="challenge-footer__copy">格上挑戦ボーナス！勝敗に関わらずポイント500pプレゼント</p>
  </footer>

  <script>
    document.querySelectorAll('.planned-member[data-prev-same="true"]').forEach((member) => {
      const meta = member.querySelector('.planned-member__meta');
      if (!meta || meta.querySelector('.planned-member__badge')) return;
      const badge = document.createElement('span');
      badge.className = 'planned-member__badge';
      badge.textContent = member.dataset.prevLabel || '前回も一緒！';
      meta.appendChild(badge);
    });
  </script>
  <script src="./prototype-map.js"></script>
</body>
</html>
