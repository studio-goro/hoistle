<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <title>PayPay利用規約への同意</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@100..900&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="../design-system/design-system-example-components-html-main/src/global.css">
  <link rel="stylesheet" href="../design-system/design-system-example-components-html-main/src/components/button/button.css">
  <style>
    html {
      background: #d0d0d0;
    }

    body {
      font-family: 'Noto Sans JP', sans-serif;
      background: var(--color-neutral-solid-gray-50);
      margin: 0 auto;
      max-width: 390px;
      min-height: 100vh;
      box-shadow: 0 0 16px rgba(0,0,0,0.15);
      display: flex;
      flex-direction: column;
      padding: 0;

<body>

  <!-- PayPay画面スクリーンショット（タップ不可） -->

    class="screenshot"

    draggable="false"
  >

  <!-- アクションボタン -->
  <div class="action-area">
    <a href="13_paypay-auth-redirect.html" class="dads-button" data-size="lg" data-type="solid-fill" role="button">上記に同意して続ける</a>
